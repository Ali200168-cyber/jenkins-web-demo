<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Lab Task</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000000);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    max-width: 850px;
    padding: 40px;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #00ffe5;
}

h2 {
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 20px;
    color: #d1d1d1;
}

.info {
    font-size: 18px;
    margin-bottom: 30px;
    color: #ffffff;
}

.card {
    margin-top: 20px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,255,229,0.2);
}

.badge {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 20px;
    border-radius: 50px;
    background: #00ffe5;
    color: black;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

    <h1>🚀 DevOps Lab Task</h1>

    <div class="info">
        <p><b>Created By:</b> Ali Hassan</p>
        <p><b>Roll No:</b> FA22-BSE-065</p>
    </div>

    <div class="card">
        <h2>CI/CD Pipeline Deployment</h2>
        <p>This project is deployed using Jenkins on AWS EC2 with Nginx web server.</p>
        
        <div class="badge">
            Jenkins + GitHub + EC2 + Nginx
        </div>
    </div>

</div>

</body>
</html>
